name: Regenerate Types

on:
  workflow_dispatch:

jobs:
  regenerate:
    name: Regenerate SDK types from latest spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate types
        run: npm run generate:types:remote || npm run generate:types:local

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/types/_generated.ts
          if git diff --cached --quiet; then
            echo "No type changes to commit"
          else
            git commit -m "chore: regenerate types from latest OpenAPI spec"
            git push
          fi
